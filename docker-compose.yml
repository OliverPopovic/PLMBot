services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: plmbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plmbot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
